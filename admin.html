<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Zine Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

  <style>
    /* ... (Style tetap estetik sesuai permintaanmu) ... */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: white; font-family: 'Poppins', sans-serif; min-height: 100vh; }
    .gif-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background-size: cover; z-index: -1; }
    .gif-bg::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px; margin: 20px auto; width: 92%; max-width: 500px; }
    h1 { text-align: center; letter-spacing: 3px; font-size: 20px; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 10px; opacity: 0.7; margin-bottom: 5px; text-transform: uppercase; }
    input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; font-size: 13px; }
    .drop-zone { border: 2px dashed rgba(255,255,255,0.2); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; }
    #coverPreview { width: 120px; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #fff; }
    button { width: 100%; padding: 14px; background: white; color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:disabled { opacity: 0.3; }
    .zine-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; }
    .zine-item img { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; }
    .zine-info { flex: 1; font-size: 11px; }
    #uploadSection { display: none; padding-top: 40px; }
  </style>
</head>
<body>
  <div class="gif-bg" id="bgElement"></div>
  
  <div id="loginSection" style="display: flex; align-items: center; min-height: 100vh;">
    <div class="glass">
      <h1>ADMIN ACCESS</h1>
      <input type="password" id="adminPassword" placeholder="Password..." onkeypress="if(event.key==='Enter')login()">
      <button onclick="login()">LOGIN</button>
    </div>
  </div>
  
  <div id="uploadSection">
    <div class="glass">
      <h3>NEW ZINE UPLOAD</h3>
      <br>
      <div class="form-group">
        <label>File PDF (Auto Cover)</label>
        <div class="drop-zone" onclick="document.getElementById('pdfInput').click()">
          <span id="dropText">Pilih PDF</span>
          <center><img id="coverPreview"></center>
        </div>
        <input type="file" id="pdfInput" accept=".pdf" style="display: none;" onchange="handleFile(this.files[0])">
      </div>

      <div class="form-group">
        <label>Judul Zine</label>
        <input type="text" id="zineTitle" placeholder="Masukkan judul...">
      </div>

      <div class="form-group">
        <label>Judul Musik (Credit)</label>
        <input type="text" id="musicTitle" placeholder="Contoh: Title Fight - Head in the Ceiling Fan">
      </div>

      <div class="form-group">
        <label>File Musik (.mp3)</label>
        <input type="file" id="musicFile" accept=".mp3,audio/mpeg,audio/mp3,audio/*">
        <p style="font-size: 9px; opacity: 0.5; margin-top: 5px;">Atau masukkan link manual di bawah jika tidak upload file:</p>
        <input type="text" id="musicUrlManual" placeholder="https://example.com/music.mp3" style="margin-top: 5px;">
      </div>

      <button onclick="processUpload()" id="uploadBtn" disabled>UPLOAD & SAVE</button>
      <p id="statusTxt" style="font-size: 10px; text-align: center; margin-top: 10px; color: yellow;"></p>
    </div>

    <div class="glass">
      <h3>ZINE LIST</h3>
      <br>
      <div id="zineList">Loading...</div>
    </div>
  </div>

  <script>
    const SUBA_URL = "https://yzekxpgjgnbksaleosti.supabase.co";
    const SUBA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6ZWt4cGdqZ25ia3NhbGVvc3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzc1NjksImV4cCI6MjA4OTkxMzU2OX0.GXUHhaFQji-KfeFGwJ3ratj-uvm5E8KBvXp_oXNl0Y4";
    const _supabase = supabase.createClient(SUBA_URL, SUBA_KEY);

    let selectedPDF = null;
    let coverBlob = null;

    function login() {
      if (document.getElementById("adminPassword").value === "Ulin123") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("uploadSection").style.display = "block";
        fetchZines();
      } else { alert("Wrong password!"); }
    }

    async function handleFile(file) {
      if (!file) return;
      selectedPDF = file;
      document.getElementById("dropText").innerText = file.name;
      
      const reader = new FileReader();
      reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1 });
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        
        const previewImg = document.getElementById("coverPreview");
        previewImg.src = canvas.toDataURL();
        previewImg.style.display = "block";
        
        canvas.toBlob((blob) => { coverBlob = blob; }, "image/jpeg", 0.8);
        document.getElementById("uploadBtn").disabled = false;
      };
      reader.readAsArrayBuffer(file);
    }

    async function processUpload() {
      const btn = document.getElementById("uploadBtn");
      const title = document.getElementById("zineTitle").value;
      const mTitle = document.getElementById("musicTitle").value;
      const mFile = document.getElementById("musicFile").files[0];
      const mUrlManual = document.getElementById("musicUrlManual").value;
      
      if(!title) return alert("Title is required!");
      
      btn.disabled = true;
      document.getElementById("statusTxt").innerText = "Uploading data... please wait.";

      try {
        const ts = Date.now();
        
        // 1. Upload PDF & Cover
        const pdfPath = `pdfs/${ts}_zine.pdf`;
        await _supabase.storage.from('zine-files').upload(pdfPath, selectedPDF);
        const pdfUrl = _supabase.storage.from('zine-files').getPublicUrl(pdfPath).data.publicUrl;

        const coverPath = `covers/${ts}_thumb.jpg`;
        await _supabase.storage.from('zine-files').upload(coverPath, coverBlob);
        const coverUrl = _supabase.storage.from('zine-files').getPublicUrl(coverPath).data.publicUrl;

        // 2. Handle Music (File or Link)
        let finalMusicUrl = mUrlManual;
        if (mFile) {
          const mPath = `music/${ts}_${mFile.name}`;
          await _supabase.storage.from('zine-files').upload(mPath, mFile);
          finalMusicUrl = _supabase.storage.from('zine-files').getPublicUrl(mPath).data.publicUrl;
        }

        // 3. Save to DB
        await _supabase.from('zine').insert([{
          title: title,
          pdf_url: pdfUrl,
          cover_url: coverUrl,
          music_url: finalMusicUrl || null,
          music_title: mTitle || "Default Theme",
          views: 0
        }]);

        alert("Zine uploaded successfully!");
        location.reload();
      } catch (e) {
        alert("Error: " + e.message);
        btn.disabled = false;
      }
    }

    async function fetchZines() {
      const { data } = await _supabase.from('zine').select('*').order('id', {ascending: false});
      const list = document.getElementById("zineList");
      list.innerHTML = "";
      data.forEach(z => {
        list.innerHTML += `
          <div class="zine-item">
            <img src="${z.cover_url}">
            <div class="zine-info">
              <strong>${z.title}</strong><br>
              <span style="opacity:0.5">Music: ${z.music_title || '-'}</span>
            </div>
            <button onclick="deleteZine(${z.id})" style="width:auto; padding:5px 10px; font-size:9px; background:red; color:white;">DEL</button>
          </div>
        `;
      });
    }

    async function deleteZine(id) {
      if(confirm("Delete this zine?")) {
        await _supabase.from('zine').delete().eq('id', id);
        fetchZines();
      }
    }
  </script>
</body>
</html>
