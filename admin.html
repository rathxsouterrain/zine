<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zine Archive - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { letter-spacing: 5px; font-size: 16px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        label { display: block; text-align: left; font-size: 10px; opacity: 0.5; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a0a0a; border: 1px solid #222; border-radius: 8px; color: #fff; box-sizing: border-box; font-family: sans-serif; }
        input:focus { border-color: #555; outline: none; }
        button { width: 100%; padding: 15px; margin-top: 30px; border-radius: 30px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: sans-serif; }
        button:hover { background: #ccc; }
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        #status { font-size: 11px; margin-top: 20px; text-align: center; min-height: 1em; color: #888; }
    </style>
</head>
<body>

<div class="glass">
    <h2>ADD TO ARCHIVE</h2>
    
    <label>Zine Title</label>
    <input type="text" id="title" placeholder="e.g. DARKEST HOUR VOL. 1">
    
    <label>Background Music (Optional)</label>
    <input type="text" id="musicTitle" placeholder="Artist - Track Name">
    
    <label>Cover Image (JPG/PNG)</label>
    <input type="file" id="coverFile" accept="image/*">
    
    <label>PDF File</label>
    <input type="file" id="pdfFile" accept=".pdf">
    
    <button id="uploadBtn" onclick="publishZine()">PUBLISH ZINE</button>
    <div id="status">Ready</div>
</div>

<script>
    // MASUKKAN DATA API KAMU DI SINI
    const SUBA_URL = "https://yzekxpgjgnbksaleosti.supabase.co";
    const SUBA_KEY = "sb_publishable_Xa6zqP2tRRCTaVUcubIAQw_0Pze_knE";
    const _supabase = supabase.createClient(SUBA_URL, SUBA_KEY);

    async function publishZine() {
        const title = document.getElementById('title').value;
        const music = document.getElementById('musicTitle').value || "Silent";
        const coverFile = document.getElementById('coverFile').files[0];
        const pdfFile = document.getElementById('pdfFile').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('uploadBtn');

        if (!title || !coverFile || !pdfFile) return alert("Please complete the form!");

        btn.disabled = true;
        status.innerText = "Uploading files to storage...";

        try {
            // 1. Upload Cover
            const cName = `covers/_`;
            await _supabase.storage.from('zine-files').upload(cName, coverFile);
            const { data: cUrl } = _supabase.storage.from('zine-files').getPublicUrl(cName);

            // 2. Upload PDF
            const pName = `pdfs/_`;
            await _supabase.storage.from('zine-files').upload(pName, pdfFile);
            const { data: pUrl } = _supabase.storage.from('zine-files').getPublicUrl(pName);

            // 3. Simpan ke Database
            status.innerText = "Saving to database...";
            const { error: dbErr } = await _supabase.from('zine').insert([
                { 
                    title: title, 
                    music_title: music,
                    cover_url: cUrl.publicUrl, 
                    pdf_url: pUrl.publicUrl,
                    views: 0 
                }
            ]);

            if (dbErr) throw dbErr;

            status.style.color = "#00ff00";
            status.innerText = "SUCCESSFULLY PUBLISHED!";
            setTimeout(() => location.reload(), 2000);

        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            status.innerText = "Failed to upload.";
            status.style.color = "red";
        }
    }
</script>
</body>
</html>
